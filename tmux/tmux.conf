# Mouse support
set -g mouse on

# remap prefix from 'Ctrl + b' to 'Ctrl + k'
unbind C-b
set-option -g prefix C-k
bind-key C-k send-prefix

# split panes using | (Horizontal) and \ (Vertical)
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# switch panes using vim keybindings  h(Left) / j(Up) / k(Down) / l(Right)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Use Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# show all the key bindings (Ctrl + k + ?)
bind ? list-keys




#----------------- Design changes --------------------------

# Enable true color support
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Status update interval
set -g status-interval 2

# --- Nord Theme Colors ---

# Basic status bar colors
set -g status-style "bg=#2e3440,fg=#d8dee9"

# Left side: Session name
set -g status-left-length 40
set -g status-left "#[fg=#2e3440,bg=#88c0d0,bold] #S #[fg=#88c0d0,bg=#2e3440,nobold]"

# Right side: Date and Time
set -g status-right-length 80
set -g status-right "#[fg=#3b4252,bg=#2e3440]#[fg=#d8dee9,bg=#3b4252] %Y-%m-%d  %H:%M #[fg=#88c0d0,bg=#3b4252]#[fg=#2e3440,bg=#88c0d0,bold] #H "

# Window status formatting
set -g window-status-format "#[fg=#2e3440,bg=#3b4252]#[fg=#d8dee9,bg=#3b4252] #I #W #[fg=#3b4252,bg=#2e3440]"
set -g window-status-current-format "#[fg=#2e3440,bg=#81a1c1]#[fg=#2e3440,bg=#81a1c1,bold] #I #W #[fg=#81a1c1,bg=#2e3440]"

# Window spacing
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#3b4252"
set -g pane-active-border-style "fg=#88c0d0"
